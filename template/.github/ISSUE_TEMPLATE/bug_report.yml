name: Bug Report
description: Report a workflow issue
labels: ["bug"]
body:
  - type: input
    id: workflow
    attributes:
      label: Workflow
      description: Which workflow has the issue?
      placeholder: "e.g., 01-customer-onboarding"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Trigger (Webhook/Schedule)
        - AI/LLM Node
        - Code Node
        - Integration (MCP/HTTP)
        - Routing (Switch/IF)
        - Output (Telegram/Email)
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
